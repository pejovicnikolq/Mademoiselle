<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="author" content="Nikola Pejovic" />

    <!--ios compatibility-->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Mademoiselle" />
    <link rel="apple-touch-icon" href="apple-icon-144x144.png" />

    <!--Android compatibility-->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Mademoiselle" />
    <link rel="icon" type="image/png" href="android-icon-192x192.png" />

    <!-- CSS Files -->
    <link rel="stylesheet" href="css/theme.css" />
  </head>
  <body>
    <header class="bg-white py-3 py-lg-5">
      <nav class="navbar navbar-expand-lg">
        <div class="container">
          <a class="navbar-brand" href="index.html"
            ><img src="img/logoM.png" alt="Logo"
          /></a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#main-menu"
            aria-controls="main-menu"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span></span>
            <span></span>
            <span class="mb-0"></span>
          </button>
          <div class="collapse navbar-collapse" id="main-menu">
            <ul class="navbar-nav ms-auto py-4 py-lg-0 text-center">
              <li class="nav-item">
                <a class="nav-link text-uppercase" href="about.html">about</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-uppercase" href="services.html"
                  >services</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link text-uppercase" href="blog.html">blog</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-uppercase active" href="contact.html"
                  >contact</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section class="contact-hero bg-white">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-12 col-lg-5">
              <h2
                class="text-uppercase fw-500 animation"
                data-animation="slide-right"
              >
                Please contact us using the form bellow
              </h2>
              <form
                action="#"
                method="POST"
                class="contact-form animation"
                data-animation="slide-right"
              >
                <input
                  type="text"
                  class="form-control rounded-0"
                  id="name"
                  name="name"
                  placeholder="Name and surname*"
                  required
                />

                <input
                  type="email"
                  class="form-control rounded-0"
                  id="email"
                  name="email"
                  placeholder="Email address*"
                  required
                />

                <input
                  type="text"
                  class="form-control rounded-0"
                  id="subject"
                  name="subject"
                  placeholder="Subject*"
                  required
                />

                <textarea
                  class="form-control rounded-0 mb-0"
                  id="message"
                  name="message"
                  rows="4"
                  placeholder="Enter your message*"
                  required
                ></textarea>
                <button
                  type="submit"
                  class="btn btn-light border-dark text-dark rounded-0 fw-normal text-uppercase mb-5 mb-lg-0"
                >
                  Send message
                </button>
              </form>
            </div>
            <div class="col-12 col-lg-6 offset-lg-1">
              <figure class="contact-img animation" data-animation="slide-left">
                <img src="img/contact.png" alt="Map" />
              </figure>
            </div>
          </div>
        </div>
      </section>
      <section class="contact-info">
        <div class="container text-center">
          <p class="contact-info-text text-uppercase fw-normal">
            146 Douglas Dale Suite 343
          </p>
          <p class="contact-info-text text-uppercase fw-normal">560-748-5959</p>
          <p class="contact-info-text text-uppercase fw-normal">
            cullen_mueller@yahoo.com
          </p>
        </div>
      </section>
    </main>
    <footer class="bg-white">
      <div class="container text-center animation" data-animation="slide-top">
        <ul
          class="social-list d-flex justify-content-center align-items-center"
        >
          <li>
            <a
              class="fa-brands fa-facebook-f"
              href="https://www.facebook.com/madmoiselle"
              target="_blank"
            ></a>
          </li>
          <li>
            <a
              class="fa-brands fa-twitter"
              href="https://www.twitter.com/madmoiselle"
              target="_blank"
            ></a>
          </li>
          <li>
            <a
              class="fa-brands fa-instagram"
              href="https://www.instagram.com/madmoiselle"
              target="_blank"
            ></a>
          </li>
        </ul>
        <p class="footer-text fw-normal">Copyright © 2019 Mademoiselle</p>
      </div>
    </footer>

    <!-- JS File -->
    <script
      src="https://kit.fontawesome.com/17f49c50b1.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/jquery.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
